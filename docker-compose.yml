services:
  mcp_server:
    build: ./mcp_server
    container_name: mcp_server
    expose:
      - "8000"
    env_file:
      - ./mcp_server/.env.docker
    networks:
      - app_network
    restart: unless-stopped

  web_service:
    build: ./web_service
    container_name: web_service
    ports:
      - "3040:3000"
    env_file:
      - ./web_service/.env.docker
    environment:
      - MCP_SERVER_URL=http://mcp_server:8000
    depends_on:
      - mcp_server
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
